<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botball HQ Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0c10; }
        ::-webkit-scrollbar-thumb { background: #1f2833; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #45f3ff; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = Motion;

        // ======= CONFIGURATION PANEL =======
        const SUPABASE_URL = "https://jhxhootjwtnrevlyilwi.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_uJQccdNtbekmvt5xtv6dbA_D0DujBGZ";

        // Whitelist security system applied inside the code logic
        const ALLOWED_USERS = [
            "rishabh.batia248@gmail.com",
            "yourfriend@gmail.com"
        ];
        // ===================================

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [isLogin, setIsLogin] = useState(true);
            const [messages, setMessages] = useState([]);
            const [text, setText] = useState("");
            const chatEndRef = useRef(null);

            useEffect(() => {
                db.auth.getSession().then(({ data: { session } }) => {
                    if (session) setUser(session.user);
                });

                const { data: { subscription } } = db.auth.onAuthStateChange((_event, session) => {
                    setUser(session ? session.user : null);
                });

                if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();
                }

                return () => subscription.unsubscribe();
            }, []);

            useEffect(() => {
                if (user) {
                    loadMessages();
                    const channel = db
                        .channel('live-chat')
                        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                            setMessages(prev => [...prev, payload.new]);
                            triggerSystemNotification(payload.new);
                        })
                        .subscribe();

                    return () => db.removeChannel(channel);
                }
            }, [user]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const loadMessages = async () => {
                const { data, error } = await db.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
                if (!error && data) setMessages(data);
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                const cleanEmail = email.trim().toLowerCase();
                if (!cleanEmail || !password) return;

                if (isLogin) {
                    const { error } = await db.auth.signInWithPassword({ email: cleanEmail, password });
                    if (error) alert("Access Denied: " + error.message);
                } else {
                    // Stop signup instantly if email isn't on your whitelist
                    if (!ALLOWED_USERS.includes(cleanEmail)) {
                        alert("Access Denied: You are not authorized on the Botball grid network.");
                        return;
                    }

                    const { error } = await db.auth.signUp({ email: cleanEmail, password });
                    if (error) alert("Registration Blocked: " + error.message);
                    else alert("Verification baseline transmitted. Check your Gmail inbox to activate your node!");
                }
            };

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!text.trim()) return;
                const messageContent = text;
                setText("");

                const { error } = await db.from('messages').insert([{
                    sender: user.email.split('@')[0],
                    content: messageContent
                }]);
                if (error) alert("Transmission failed. Confirm database RLS settings match whitelist.");
            };

            const triggerSystemNotification = (msg) => {
                const senderName = user.email.split('@')[0];
                if (msg.sender !== senderName && document.hidden && Notification.permission === "granted") {
                    new Notification(`🤖 Botball Data Link [${msg.sender}]`, { body: msg.content });
                }
            };

            return (
                <div class="h-screen w-screen flex items-center justify-center p-4 bg-[#0b0c10] relative">
                    <div class="absolute inset-0 opacity-[0.03] pointer-events-none bg-[radial-gradient(#45f3ff_1px,transparent_0)] bg-[size:20px_20px]"></div>

                    <AnimatePresence mode="wait">
                        {!user ? (
                            /* ANIMATED LOGIN LAYER */
                            <motion.div 
                                key="auth"
                                initial={{ opacity: 0, y: 40, scale: 0.95 }}
                                animate={{ opacity: 1, y: 0, scale: 1 }}
                                exit={{ opacity: 0, y: -40, scale: 0.95 }}
                                transition={{ duration: 0.4, ease: [0.16, 1, 0.3, 1] }}
                                class="bg-[#1f2833]/40 backdrop-blur-md p-8 rounded-xl border border-[#45f3ff]/20 shadow-[0_0_30px_rgba(69,243,255,0.05)] w-full max-w-sm relative overflow-hidden"
                            >
                                <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-[#45f3ff] to-transparent"></div>
                                
                                <h2 class="text-xl font-bold tracking-widest text-center text-white mb-6 uppercase">
                                    {isLogin ? "// SECURE_LOGIN" : "// CREATE_NODE"}
                                </h2>

                                <form onSubmit={handleAuth} class="space-y-4">
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-[#66fcf1] mb-1">Operator ID (Email)</label>
                                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} class="w-full p-2.5 bg-[#0b0c10]/80 border border-[#1f2833] rounded text-white focus:outline-none focus:border-[#45f3ff] text-sm font-mono tracking-wide transition-colors" />
                                    </div>
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-[#66fcf1] mb-1">Access Key (Password)</label>
                                        <input type="password" value={password} onChange={e => setPassword(e.target.value)} class="w-full p-2.5 bg-[#0b0c10]/80 border border-[#1f2833] rounded text-white focus:outline-none focus:border-[#45f3ff] text-sm transition-colors" />
                                    </div>
                                    <motion.button whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }} type="submit" class="w-full bg-gradient-to-r from-[#1f2833] to-[#45f3ff]/20 text-[#45f3ff] border border-[#45f3ff]/40 p-2.5 rounded text-xs uppercase font-bold tracking-widest hover:bg-[#45f3ff]/20 transition-all cursor-pointer shadow-[0_0_15px_rgba(69,243,255,0.1)]">
                                        {isLogin ? "Initialize Session" : "Deploy Credentials"}
                                    </motion.button>
                                </form>
                                <p class="text-[10px] text-[#c5c6c7] mt-4 text-center tracking-wider">
                                    {isLogin ? "Awaiting system handshake... " : "Existing profile detected? "}
                                    <button onClick={() => setIsLogin(!isLogin)} class="text-[#45f3ff] underline cursor-pointer bg-transparent border-none">
                                        {isLogin ? "Register Node" : "Return to Login"}
                                    </button>
                                </p>
                            </motion.div>
                        ) : (
                            /* ANIMATED CHAT LAYER */
                            <motion.div 
                                key="chat"
                                initial={{ opacity: 0, scale: 0.98 }}
                                animate={{ opacity: 1, scale: 1 }}
                                exit={{ opacity: 0, scale: 0.98 }}
                                transition={{ duration: 0.5 }}
                                class="w-full max-w-4xl h-[85vh] flex flex-col bg-[#1f2833]/10 backdrop-blur-lg border border-[#45f3ff]/10 rounded-xl overflow-hidden shadow-[0_0_50px_rgba(11,12,16,0.8)]"
                            >
                                <header class="p-4 bg-[#0b0c10]/90 border-b border-[#1f2833] flex justify-between items-center z-10">
                                    <div class="flex items-center gap-3">
                                        <span class="w-2 h-2 rounded-full bg-[#45f3ff] animate-pulse shadow-[0_0_8px_#45f3ff]"></span>
                                        <h1 class="text-sm font-bold uppercase tracking-widest text-white flex items-center gap-2">
                                            botball_network://<span class="text-[#45f3ff]">hq-terminal</span>
                                        </h1>
                                    </div>
                                    <button onClick={() => db.auth.signOut()} class="text-[10px] text-[#c5c6c7] hover:text-[#ff4545] border border-[#1f2833] hover:border-[#ff4545]/40 px-3 py-1 rounded tracking-widest transition-all cursor-pointer uppercase bg-transparent">
                                        Disconnect
                                    </button>
                                </header>

                                <main class="flex-grow p-6 overflow-y-auto space-y-4 bg-[#0b0c10]/40">
                                    <AnimatePresence initial={false}>
                                        {messages.map((msg) => (
                                            <motion.div 
                                                key={msg.id}
                                                initial={{ opacity: 0, x: -10, y: 5 }}
                                                animate={{ opacity: 1, x: 0, y: 0 }}
                                                transition={{ duration: 0.25, ease: "easeOut" }}
                                                class="flex flex-col border-l-2 border-[#1f2833] pl-3 py-0.5 hover:border-[#45f3ff]/40 transition-colors"
                                            >
                                                <div class="flex items-baseline gap-2">
                                                    <span class="text-xs font-bold text-[#45f3ff] tracking-wide">&lt;{msg.sender}&gt;</span>
                                                    <span class="text-[9px] text-[#1f2833] font-mono">
                                                        {new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                                    </span>
                                                </div>
                                                <div class="text-sm text-[#c5c6c7] mt-1 tracking-wide font-mono break-all">{msg.content}</div>
                                            </motion.div>
                                        ))}
                                    </AnimatePresence>
                                    <div ref={chatEndRef} />
                                </main>

                                <footer class="p-4 bg-[#0b0c10]/90 border-t border-[#1f2833]">
                                    <form onSubmit={sendMessage} class="flex items-center bg-[#0b0c10] border border-[#1f2833] focus-within:border-[#45f3ff] rounded px-3 py-2 transition-colors">
                                        <span class="text-[#45f3ff] text-xs font-mono mr-2">&gt;&gt;</span>
                                        <input 
                                            type="text" 
                                            value={text} 
                                            onChange={e => setText(e.target.value)}
                                            placeholder="Awaiting command input..." 
                                            class="flex-grow bg-transparent text-white focus:outline-none placeholder-[#1f2833] text-sm font-mono tracking-wide"
                                            autoComplete="off"
                                        />
                                    </form>
                                </footer>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
